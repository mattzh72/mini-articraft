name: ci

on:
  pull_request:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: ${{ github.ref != 'refs/heads/main' }}

jobs:
  checks:
    name: checks
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up uv
        uses: astral-sh/setup-uv@v7
        with:
          version: "0.9.17"
          enable-cache: true
          cache-dependency-glob: uv.lock

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: uv sync --group dev --frozen

      - name: Check repository hygiene
        run: uv run --frozen python scripts/check_repo_hygiene.py

      - name: Check formatting
        run: uv run --frozen ruff format --check src/mini_articraft tests

      - name: Lint
        run: uv run --frozen ruff check src/mini_articraft tests

      - name: Type check
        run: uv run --frozen basedpyright

      - name: Test
        # --replay: cassette-backed tests stay offline (live is the local default)
        run: uv run --frozen pytest -q --replay
