name: ci

on:
  pull_request:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  actions: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: ${{ github.ref != 'refs/heads/main' }}

jobs:
  checks:
    name: checks
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up uv
        uses: astral-sh/setup-uv@v7
        with:
          version: "0.9.17"
          enable-cache: true
          cache-dependency-glob: uv.lock

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: uv sync --group dev --frozen

      - name: Check repository hygiene
        run: uv run --frozen python scripts/check_repo_hygiene.py

      - name: Check formatting
        run: uv run --frozen ruff format --check src/mini_articraft tests

      - name: Lint
        run: uv run --frozen ruff check src/mini_articraft tests

      - name: Type check
        run: uv run --frozen basedpyright

      - name: Download latest recorded tapes (best effort)
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # The workflow may not exist yet on the default branch (renames land
          # on branches first); a lookup failure just means no artifact yet.
          run_id=$(gh run list --workflow record-tapes.yml --status success \
            --limit 1 --json databaseId --jq '.[0].databaseId // empty' || true)
          if [ -n "$run_id" ]; then
            mkdir -p /tmp/ci-tapes
            gh run download "$run_id" --name tapes --dir /tmp/ci-tapes || true
            cp /tmp/ci-tapes/*.jsonl tests/tapes/ 2>/dev/null || true
          fi

      - name: Test
        # --replay: tape-backed tests replay offline in CI; a missing tape
        # fails the job (locally they run live by default -- no tape is read)
        run: uv run --frozen pytest -q --replay

  dist:
    name: dist (py${{ matrix.python-version }})
    runs-on: ubuntu-latest
    timeout-minutes: 20
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12"]

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up uv
        uses: astral-sh/setup-uv@v7
        with:
          version: "0.9.17"
          enable-cache: true
          cache-dependency-glob: uv.lock

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}

      - name: Build sdist and wheel
        run: uv build

      - name: Check distributions
        run: uvx twine check dist/*

      - name: Smoke-test the wheel in a clean environment
        run: |
          uv venv /tmp/smoke
          uv pip install --python /tmp/smoke/bin/python dist/*.whl
          /tmp/smoke/bin/python -c "
          import mini_articraft
          from mini_articraft import package_dir
          from mini_articraft.sdk import ArticulatedObject, TestContext
          assert (package_dir / 'prompts' / 'system.md').is_file()
          assert (package_dir / 'viewer.html').is_file()
          assert (package_dir / 'sdk' / 'docs' / 'common' / '00_quickstart.md').is_file()
          "
          mkdir -p /tmp/sdk-smoke
          cp examples/hinged_box/main.py /tmp/sdk-smoke/main.py
          /tmp/smoke/bin/python -c "
          import sys
          from pathlib import Path
          sys.path.insert(0, '/tmp/sdk-smoke')
          from main import object_model, run_tests
          from mini_articraft.sdk.export import export_object
          object_model.validate()
          assert run_tests().passed
          result = export_object(object_model, Path('/tmp/sdk-smoke/output'))
          assert result.manifest.is_file()
          assert result.usdz.is_file()
          "
          /tmp/smoke/bin/python -c "
          import shutil
          from pathlib import Path
          from mini_articraft.environments import LocalEnvironment
          env = LocalEnvironment(output_dir=Path('/tmp'))
          run_dir = env.create_run('smoke-run')
          shutil.copyfile('examples/mesh_knob/main.py', run_dir / 'workspace' / 'main.py')
          payload = env.compile_path(run_dir)
          assert payload['status'] == 'success', payload
          "
